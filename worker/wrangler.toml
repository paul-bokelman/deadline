name = "deadline-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "a4431bc8caa4d69cbd7f37855942acec"

# CORS allow-list. Comma-separated. Add Vercel preview origins here as needed.
[vars]
ALLOWED_ORIGINS = "https://deadline.pab.dev,http://localhost:5173,http://localhost:4173"
REQUIRED_CHECKPOINTS = "password_solved,email_sent,portal_captcha_cleared"
MAX_RUN_MS = "86400000"          # 24 hours
MIN_RUN_MS = "0"                 # no minimum
RATE_LIMIT_STARTS_PER_MIN = "30" # per IP
CLEANUP_OPEN_AFTER_MS = "86400000"     # 24h: drop abandoned 'open' runs older than this
CLEANUP_EXPIRED_AFTER_MS = "604800000" # 7 days: drop failed 'expired' runs older than this

# Daily cleanup at 04:00 UTC.
[triggers]
crons = ["0 4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "deadline-leaderboard"
database_id = "ffb59960-700d-4510-8f06-fb642248d9cb"
